# Development bind mounts — source code is mounted for live reload.
# Included automatically by `make up` (local dev only).
# NOT included in prod, server-dev, or self-host stacks.
#
# Why this is a separate file:
#   Docker Compose v2 extends arrays (volumes, ports) rather than replacing them.
#   `volumes: []` in an override does NOT clear base mounts.
#   Keeping dev mounts here and omitting this file from prod/server-dev stacks
#   is the only reliable way to exclude them from those environments.

services:
  api:
    volumes:
      - ./backend:/app
    environment:
      UV_LINK_MODE: copy  # required when source is bind-mounted (no hardlinks across filesystems)

  web:
    volumes:
      - ./frontend:/app
      - /app/node_modules  # preserve container's node_modules (prevents host override)
