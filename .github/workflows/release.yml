name: Release

on:
  push:
    tags:
      - "v*"

env:
  BACKEND_IMAGE: ghcr.io/thibaut-d/hyphagraph-backend
  FRONTEND_IMAGE: ghcr.io/thibaut-d/hyphagraph-frontend

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HyphaGraph v${{ needs.build-and-push.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Docker images

            ```bash
            # Pin to this release
            HYPHAGRAPH_VERSION=${{ needs.build-and-push.outputs.version }}

            docker pull ghcr.io/thibaut-d/hyphagraph-backend:${{ needs.build-and-push.outputs.version }}
            docker pull ghcr.io/thibaut-d/hyphagraph-frontend:${{ needs.build-and-push.outputs.version }}
            ```

            ## Self-hosting

            1. Download [`docker-compose.self-host.yml`](https://github.com/thibaut-d/hyphagraph/blob/main/docker-compose.self-host.yml) and [`deploy/caddy/Caddyfile.self-host`](https://github.com/thibaut-d/hyphagraph/blob/main/deploy/caddy/Caddyfile.self-host)
            2. Copy `.env.prod.template` to `.env` and fill in your values
            3. Set `HYPHAGRAPH_VERSION=${{ needs.build-and-push.outputs.version }}` in your `.env`
            4. Edit `Caddyfile.self-host` with your domain
            5. Run: `docker compose -f docker-compose.self-host.yml up -d`
