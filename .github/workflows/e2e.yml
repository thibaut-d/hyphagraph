name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 5s"
            sleep 5
          done
          echo "API did not become ready in time"
          docker compose -f docker-compose.e2e.yml logs api
          exit 1

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend to be ready..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "  attempt $i/20 — retrying in 3s"
            sleep 3
          done
          echo "Frontend did not become ready in time"
          docker compose -f docker-compose.e2e.yml logs web
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3001
          API_URL: http://localhost:8001
          CI: "true"
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e/test-results/
          retention-days: 7

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down
