services:
  caddy:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  db:
    env_file:
      - .env.prod
    restart: unless-stopped

  api:
    env_file:
      - .env.prod
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes: []
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes: []
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
