services:
  caddy:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  db:
    env_file:
      - .env.prod
    restart: unless-stopped

  api:
    env_file:
      - .env.prod
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes: []
    restart: unless-stopped

  web:
    env_file:
      - .env.prod
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 3000"
    volumes: []
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
