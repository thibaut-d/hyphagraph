# Self-hosting HyphaGraph
#
# Prerequisites:
#   1. Copy .env.prod.template to .env and fill in all values
#   2. Set HYPHAGRAPH_VERSION in .env (e.g. HYPHAGRAPH_VERSION=1.2.0)
#      or leave as "latest" to always pull the newest release
#   3. Edit deploy/caddy/Caddyfile.self-host — replace your-domain.com
#   4. Ensure ports 80 and 443 are open
#
# Start:  docker compose -f docker-compose.self-host.yml up -d
# Update: docker compose -f docker-compose.self-host.yml pull && docker compose -f docker-compose.self-host.yml up -d
# Logs:   docker compose -f docker-compose.self-host.yml logs -f

services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.self-host:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

  db:
    image: postgres:16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/thibaut-d/hyphagraph-backend:${HYPHAGRAPH_VERSION:-latest}
    # Runs migrations then starts the server on every container start.
    # Alembic is idempotent — already-applied migrations are skipped.
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/thibaut-d/hyphagraph-frontend:${HYPHAGRAPH_VERSION:-latest}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
